name: portal-documentos

services:

  # ── Backend NestJS ─────────────────────────────────────────
  backend:
    container_name: portal-documentos-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "3001:3001"   # acessível na rede local
    volumes:
      - app_data:/data
      - templates_data:/app/templates
    depends_on:
      - gotenberg
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Frontend Next.js ───────────────────────────────────────
  frontend:
    container_name: portal-documentos-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_D4SIGN_DESK_URL: ${NEXT_PUBLIC_D4SIGN_DESK_URL}
    ports:
      - "3030:3030"   # acessível na rede local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3030/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Gotenberg — conversão de documentos ────────────────────
  gotenberg:
    container_name: portal-documentos-gotenberg
    image: gotenberg/gotenberg:8
    command:
      - gotenberg
      - --chromium-disable-routes=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m

# ── Volumes persistentes ────────────────────────────────────
volumes:
  app_data:       # banco, documentos gerados, anexos, backups
  templates_data: # arquivos PDF base dos modelos overlay
