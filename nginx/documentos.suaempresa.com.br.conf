# ──────────────────────────────────────────────────────────────────────────────
# Portal de Documentos — documentos.suaempresa.com.br
# Nginx do sistema (não Docker) — porteiro central da VPS
#
# Instalar:
#   cp nginx/documentos.suaempresa.com.br.conf /etc/nginx/sites-available/documentos.suaempresa.com.br
#   ln -s /etc/nginx/sites-available/documentos.suaempresa.com.br /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name documentos.suaempresa.com.br;

    # Limite de upload — cobre PDFs base e anexos de submissão
    client_max_body_size 50M;

    # ── API → backend NestJS (porta 3001) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Geração de documentos e uploads podem demorar
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Frontend → Next.js (porta 3030) ───────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

