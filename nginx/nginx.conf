upstream backend  { server backend:3001; }
upstream frontend { server frontend:3030; }

server {
    listen 80;
    server_name _;

    # Limite de upload — cobre PDFs base e anexos de submissão
    client_max_body_size 50M;

    # ── API → backend (nginx remove o prefixo /api antes de repassar) ──
    location /api/ {
        proxy_pass         http://backend/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Geração de documentos e upload de templates podem demorar
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Frontend → Next.js ─────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}

